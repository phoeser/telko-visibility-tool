<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="dot" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <!-- Concentric "visibility / radar" rings -->
  <g fill="none" stroke="#ffffff" stroke-linecap="round">
    <circle cx="256" cy="256" r="180" stroke-opacity="0.18" stroke-width="10"/>
    <circle cx="256" cy="256" r="130" stroke-opacity="0.30" stroke-width="10"/>
    <circle cx="256" cy="256" r="82"  stroke-opacity="0.55" stroke-width="10"/>
  </g>
  <!-- Brand dot in center -->
  <circle cx="256" cy="256" r="38" fill="url(#dot)"/>
  <!-- Signal bars (KPI vibe) bottom-right -->
  <g fill="#ffffff" fill-opacity="0.95">
    <rect x="340" y="368" width="22" height="44" rx="4"/>
    <rect x="372" y="344" width="22" height="68" rx="4"/>
    <rect x="404" y="312" width="22" height="100" rx="4"/>
  </g>
</svg>
